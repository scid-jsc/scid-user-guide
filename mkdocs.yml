site_name: SCID — Hướng dẫn Sử dụng
site_url: https://document.scid.vn
site_description: Hướng dẫn sử dụng hệ thống ERP của SCID JSC
site_author: SCID JSC

theme:
  name: material
  language: vi
  custom_dir: overrides
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Be Vietnam Pro
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    logo: material/file-document-outline
    admonition:
      note: material/pencil-circle
      tip: material/lightbulb-on
      warning: material/alert
      danger: material/alert-octagon
      info: material/information
      example: material/test-tube

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/scid-jsc
  generator: false

copyright: "&copy; 2026 SCID JSC"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - tables
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: Mục lục

plugins:
  - search:
      lang: vi

nav:
  - Trang chủ: index.md
  - Kế toán:
    - Vận hành Kế toán: ke-toan/van-hanh.md
    - Báo cáo TT200: ke-toan/bao-cao-tt200.md
  - Cho thuê:
    - Vận hành Cho thuê: cho-thue/van-hanh-lms.md

extra_css:
  - stylesheets/custom.css
